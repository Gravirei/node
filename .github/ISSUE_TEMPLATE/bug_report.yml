name: Bug report
description: Report a defect in a Gitlawb crate or node behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the fields below so we can reproduce the issue.
        For security vulnerabilities, do NOT open an issue — follow SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      options:
        - gitlawb-node
        - gl
        - git-remote-gitlawb
        - gitlawb-core
        - not sure / other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of the binary's `--version`, or the git commit you built.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version (`rustc --version`), and anything else relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs or errors. This will be rendered as code, no need for backticks.
      render: shell
    validations:
      required: false
